version: '3.8'

services:
  # Servicio REST (Code First)
  demo-rest:
    build:
      context: ./demo-rest
      dockerfile: Dockerfile
    container_name: api-rest-codefirst
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
    restart: unless-stopped

  # Servicio SOAP (API First)
  demo-soap:
    build:
      context: ./demo-soap
      dockerfile: Dockerfile
    container_name: api-soap-apifirst
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
    restart: unless-stopped
